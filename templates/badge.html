<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة الملتقى الوطني للاستكشاف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">



    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(160deg, #1a2e1a 0%, #2d4a1e 45%, #3d3010 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .page-title {
            text-align: center;
            color: #d4a84b;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 24px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .form-section, .badges-section {
            background: #f5f0e8;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            border: 2px solid #c8a96e;
        }

        h2 {
            color: #3d3010;
            margin-bottom: 22px;
            font-size: 20px;
            font-weight: 900;
            border-bottom: 3px solid #556b2f;
            display: inline-block;
            padding-bottom: 4px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            margin-bottom: 6px;
            color: #3d3010;
            font-weight: 700;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #c8a96e;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            background: #fffdf5;
            color: #3d3010;
            transition: all 0.3s;
            direction: rtl;
        }

        input:focus {
            outline: none;
            border-color: #556b2f;
            box-shadow: 0 0 0 3px rgba(85,107,47,0.15);
        }

        .image-upload {
            border: 2px dashed #c8a96e;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: #fffdf5;
            color: #556b2f;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }

        .image-upload:hover { border-color: #556b2f; background: #eef5e8; }

        .image-preview {
            max-width: 110px;
            max-height: 110px;
            margin: 8px auto;
            border-radius: 50%;
            display: none;
            border: 3px solid #c8a96e;
        }

        .color-options {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .color-option {
            width: 100%;
            padding-top: 100%;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }

        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: #3d3010; transform: scale(1.05); }

        .main-btn {
            background: linear-gradient(135deg, #556b2f 0%, #3d3010 100%);
            color: #f5e6c0;
            border: none;
            padding: 13px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Badge preview container */
        .badge-preview {
            margin-top: 22px;
            padding: 18px;
            background: #e8dfc8;
            border-radius: 14px;
            border: 1px solid #c8a96e;
        }

        /* ── BADGE CARD ── */
        .badge {
            width: 310px;
            height: 450px;
            margin: 0 auto;
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 0 0 4px #c8a96e, 0 0 0 8px #556b2f, 0 16px 40px rgba(0,0,0,0.45);
            background-size: cover !important;
            background-position: center !important;
        }

        .badge-bg-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15,25,8,0.5);
            z-index: 1;
            display: none;
        }
        .badge.has-bg-image .badge-bg-overlay { display: block; }

        /* Top event banner */
        .badge-event {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 3;
            background: rgba(0,0,0,0.55);
            border-bottom: 2px solid #c8a96e;
            color: #f5e6b0;
            font-family: 'Tajawal', sans-serif;
            font-size: 12.5px;
            font-weight: 800;
            padding: 9px 12px;
            text-align: center;
            line-height: 1.5;
        }

        /* Middle content */
        .badge-content {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 70px 16px 70px;
        }

        .badge-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4a84b;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.5);
            margin-bottom: 6px;
        }

        .badge-scout-icon {
            font-size: 38px;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
        }

        .badge-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #d4a84b;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.15), 0 6px 16px rgba(0,0,0,0.45);
            object-fit: cover;
            margin-bottom: 10px;
        }

        .badge-name {
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 1px 1px 8px rgba(0,0,0,0.8);
            text-align: center;
        }

        /* Bottom mission banner */
        .badge-mission-wrap {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 3;
            background: rgba(0,0,0,0.55);
            border-top: 2px solid #c8a96e;
            padding: 8px 12px;
            text-align: center;
        }

        .badge-mission-label {
            font-family: 'Tajawal', sans-serif;
            font-size: 10px;
            color: #c8a96e;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .badge-mission-value {
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 800;
            color: #f5e6b0;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
        }

        /* Badges list */
        .badges-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
            margin-top: 18px;
            max-height: 640px;
            overflow-y: auto;
        }

        .badge-item {
            position: relative;
            transition: transform 0.2s;
        }
        .badge-item:hover { transform: translateY(-5px); }

        .delete-badge {
            position: absolute;
            top: -10px; left: -10px;
            background: #c0392b;
            color: white;
            border-radius: 50%;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; font-size: 16px;
            transition: transform 0.2s;
        }
        .delete-badge:hover { transform: scale(1.15); }

        .loading {
            text-align: center; padding: 20px;
            color: #556b2f; font-weight: 700;
        }

        @media (max-width: 968px) {
            .container { grid-template-columns: 1fr; }
        }

        .success-message {
            background: #556b2f; color: #f5e6b0;
            padding: 10px; border-radius: 8px;
            margin-top: 10px; text-align: center;
            font-weight: 700; font-family: 'Tajawal', sans-serif;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform:translateY(-10px); opacity:0; }
            to   { transform:translateY(0);     opacity:1; }
        }

        .note-small { font-size:11px; color:#999; font-weight:400; }

        @media print {
            body { background: white !important; padding: 0; }
            .no-print { display: none !important; }
            .print-area {
                display: flex;
                flex-wrap: wrap;
                gap: 16px;
                padding: 10px;
                justify-content: flex-start;
            }
            .badge {
                box-shadow: 0 0 0 4px #c8a96e, 0 0 0 8px #556b2f !important;
                break-inside: avoid;
            }
            .badge-item { break-inside: avoid; }
            .delete-badge { display: none !important; }
        }
    </style>
</head>
<body>

<div class="page-title">⚜️ الملتقى الوطني للاستكشاف والمغامرة ⚜️</div>

<div class="container no-print" id="mainContainer">

    <!-- FORM -->
    <div class="form-section">
        <h2>⚜️ إنشاء البطاقة</h2>

        <div class="form-group">
            <label>👤 الاسم</label>
            <input type="text" id="firstName" placeholder="الاسم الأول">
        </div>

        <div class="form-group">
            <label>📝 اللقب</label>
            <input type="text" id="lastName" placeholder="اللقب">
        </div>

        <div class="form-group">
            <label>🎯 المهمة (الخطة)</label>
            <input type="text" id="mission" placeholder="أدخل المهمة أو الخطة">
        </div>

        <div class="form-group">
            <label>🖼️ الصورة الشخصية</label>
            <div class="image-upload" onclick="document.getElementById('photoInput').click()">
                <div>📸 انقر لتحميل صورة</div>
                <img id="imagePreview" class="image-preview" alt="معاينة">
            </div>
            <input type="file" id="photoInput" accept="image/*" style="display:none;">
        </div>

        <div class="form-group">
            <label>🌄 صورة الخلفية <span class="note-small">(اختياري)</span></label>
            <div class="image-upload" id="bgUploadZone" onclick="document.getElementById('bgInput').click()" style="position:relative;">
                <div id="bgUploadText">🌲 انقر لإضافة صورة خلفية</div>
                <img id="bgPreviewThumb" style="max-width:100%;max-height:70px;margin-top:8px;border-radius:8px;display:none;" alt="خلفية">
                <button id="removeBgBtn" onclick="removeBg(event)" style="display:none;position:absolute;top:6px;left:8px;width:auto;padding:4px 10px;font-size:12px;background:#c0392b;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Tajawal',sans-serif;">✕ حذف</button>
            </div>
            <input type="file" id="bgInput" accept="image/*" style="display:none;">
        </div>

        <div class="form-group">
            <label>🎨 لون الخلفية <span class="note-small">(يُتجاهل مع صورة)</span></label>
            <div class="color-options">
                <div class="color-option" style="background:linear-gradient(135deg,#2d4a1e,#556b2f)" data-color="linear-gradient(135deg,#2d4a1e,#556b2f)"></div>
                <div class="color-option" style="background:linear-gradient(135deg,#3d3010,#7a5c20)" data-color="linear-gradient(135deg,#3d3010,#7a5c20)"></div>
                <div class="color-option" style="background:linear-gradient(135deg,#1a3a1a,#2e6b2e)" data-color="linear-gradient(135deg,#1a3a1a,#2e6b2e)"></div>
                <div class="color-option" style="background:linear-gradient(135deg,#4a3728,#8b6347)" data-color="linear-gradient(135deg,#4a3728,#8b6347)"></div>
                <div class="color-option" style="background:linear-gradient(135deg,#1c2e3a,#2e5f7a)" data-color="linear-gradient(135deg,#1c2e3a,#2e5f7a)"></div>
                <div class="color-option" style="background:linear-gradient(135deg,#2a1a0a,#5c3d1a)" data-color="linear-gradient(135deg,#2a1a0a,#5c3d1a)"></div>
            </div>
        </div>

        <button class="main-btn no-print" onclick="createBadge()">⚜️ إنشاء البطاقة</button>

        <div class="badge-preview">
            <h3 style="margin-bottom:12px;color:#3d3010;font-weight:800;">معاينة مباشرة</h3>
            <div id="previewBadge" class="badge" style="background:linear-gradient(135deg,#2d4a1e,#556b2f)">
                <div class="badge-bg-overlay"></div>
                <div class="badge-event">الملتقى الوطني للاستكشاف والمغامرة</div>
                <div class="badge-content">
                    <img class="badge-logo" id="previewLogo" src="" alt="logo">
                    <img id="previewPhoto" class="badge-photo" src="https://via.placeholder.com/150" alt="Photo">
                    <div id="previewName" class="badge-name">الاسم واللقب</div>
                </div>
                <div class="badge-mission-wrap">
                    <div class="badge-mission-label">المهمة</div>
                    <div id="previewMission" class="badge-mission-value">—</div>
                </div>
            </div>
        </div>
    </div>

    <!-- LIST -->
    <div class="badges-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <h2 style="margin-bottom:0;">🏕️ البطاقات المُنشأة</h2>
            <button class="main-btn no-print" onclick="printHtml()" style="width:auto;padding:10px 20px;font-size:14px;">🖨️ طباعة HTML</button>
            <button class="main-btn no-print" onclick="exportPdf()" style="width:auto;padding:10px 20px;font-size:14px;">📄 تصدير PDF</button>
        </div>
        <div id="badgesList" class="badges-list print-area">
            <div class="loading">جارٍ تحميل البطاقات...</div>
        </div>
    </div>

</div>

    let currentPhoto  = null;
    let currentBgImage = null;
    let selectedColor  = "linear-gradient(135deg,#2d4a1e,#556b2f)";

    /* ── BG image ── */
    document.getElementById('bgInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = ev => {
            currentBgImage = ev.target.result;
            document.getElementById('bgPreviewThumb').src = currentBgImage;
            document.getElementById('bgPreviewThumb').style.display = 'block';
            document.getElementById('bgUploadText').style.display = 'none';
            document.getElementById('removeBgBtn').style.display = 'block';
            applyBg(document.getElementById('previewBadge'), currentBgImage);
        };
        r.readAsDataURL(file);
    });

    function applyBg(el, img) {
        if (img) {
            el.style.backgroundImage = `url(${img})`;
            el.style.backgroundSize = 'cover';
            el.style.backgroundPosition = 'center';
            el.classList.add('has-bg-image');
        } else {
            el.style.backgroundImage = '';
            el.style.background = selectedColor;
            el.classList.remove('has-bg-image');
        }
    }

    window.removeBg = function(e) {
        e.stopPropagation();
        currentBgImage = null;
        document.getElementById('bgInput').value = '';
        document.getElementById('bgPreviewThumb').style.display = 'none';
        document.getElementById('bgPreviewThumb').src = '';
        document.getElementById('bgUploadText').style.display = 'block';
        document.getElementById('removeBgBtn').style.display = 'none';
        applyBg(document.getElementById('previewBadge'), null);
    };

    /* ── Color ── */
    document.querySelectorAll('.color-option').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            selectedColor = this.dataset.color;
            if (!currentBgImage) document.getElementById('previewBadge').style.background = selectedColor;
        });
    });
    document.querySelector('.color-option').classList.add('selected');

    /* ── Photo ── */
    document.getElementById('photoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = ev => {
            currentPhoto = ev.target.result;
            document.getElementById('imagePreview').src = currentPhoto;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('previewPhoto').src = currentPhoto;
        };
        r.readAsDataURL(file);
    });

    /* ── Live preview ── */
    ['firstName','lastName','mission'].forEach(id =>
        document.getElementById(id).addEventListener('input', updatePreview)
    );

    function updatePreview() {
        const fn = document.getElementById('firstName').value;
        const ln = document.getElementById('lastName').value;
        const ms = document.getElementById('mission').value;
        document.getElementById('previewName').textContent    = (fn||ln) ? `${fn} ${ln}`.trim() : 'الاسم واللقب';
        document.getElementById('previewMission').textContent = ms || '—';
    }

    /* ── Create badge ── */
    async function createBadge() {
        const fn = document.getElementById('firstName').value.trim();
        const ln = document.getElementById('lastName').value.trim();
        const ms = document.getElementById('mission').value.trim();

        if (!fn || !ln) { alert('يرجى إدخال الاسم واللقب'); return; }

        const data = {
            firstName: fn, lastName: ln, mission: ms,
            backgroundColor: selectedColor,
            bgImage: currentBgImage || null,
            photoUrl: currentPhoto || 'https://via.placeholder.com/150'
        };

        try {
            const response = await fetch('/api/badges', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!response.ok) throw new Error('Failed to create badge');
            showSuccess('تم إنشاء البطاقة بنجاح! ⚜️');
            resetForm();
            loadBadges();
        } catch(err) {
            console.error(err);
            alert('خطأ في إنشاء البطاقة. تحقق من الاتصال بالخادم.');
        }
    }

    function resetForm() {
        ['firstName','lastName','mission'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('previewPhoto').src = 'https://via.placeholder.com/150';
        document.getElementById('photoInput').value = '';
        currentPhoto = null;
        currentBgImage = null;
        document.getElementById('bgInput').value = '';
        document.getElementById('bgPreviewThumb').style.display = 'none';
        document.getElementById('bgPreviewThumb').src = '';
        document.getElementById('bgUploadText').style.display = 'block';
        document.getElementById('removeBgBtn').style.display = 'none';
        applyBg(document.getElementById('previewBadge'), null);
        updatePreview();
    }

    function showSuccess(msg) {
        const d = document.createElement('div');
        d.className = 'success-message';
        d.textContent = msg;
        document.querySelector('.form-section').appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }

    function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    function buildCard(badge) {
        const bgStyle = badge.bgImage
            ? `background-image:url(${badge.bgImage});background-size:cover;background-position:center;`
            : `background:${badge.backgroundColor};`;
        const hasBg = badge.bgImage ? 'has-bg-image' : '';
        return `
        <div class="badge-item">
            <div class="delete-badge" onclick="deleteBadge('${badge.id}')">×</div>
            <div class="badge ${hasBg}" style="${bgStyle}">
                <div class="badge-bg-overlay"></div>
                <div class="badge-event">الملتقى الوطني للاستكشاف والمغامرة</div>
                <div class="badge-content">
                    <img class="badge-logo" src="${LOGO_B64}" alt="logo">
                    <img class="badge-photo" src="${badge.photoUrl}" alt="">
                    <div class="badge-name">${esc(badge.name)}</div>
                </div>
                <div class="badge-mission-wrap">
                    <div class="badge-mission-label">المهمة</div>
                    <div class="badge-mission-value">${esc(badge.mission||'—')}</div>
                </div>
            </div>
        </div>`;
    }

    /* ── Load badges ── */
    async function loadBadges() {
        try {
            const response = await fetch('/api/badges');
            const badges = await response.json();
            const list = document.getElementById('badgesList');
            if (!badges || badges.length === 0) {
                list.innerHTML = '<div class="loading">لا توجد بطاقات بعد</div>';
                return;
            }
            list.innerHTML = badges.map(buildCard).join('');
        } catch(err) {
            console.error(err);
            document.getElementById('badgesList').innerHTML = '<div class="loading">خطأ في تحميل البطاقات</div>';
        }
    }

    window.deleteBadge = async function(id) {
        if (confirm('هل تريد حذف هذه البطاقة؟')) {
            try {
                const response = await fetch(`/api/badges/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Failed to delete');
                showSuccess('تم الحذف');
                loadBadges();
            } catch(e) { alert('خطأ في الحذف'); }
        }
    };

    loadBadges();

    // Set logo on preview
    document.getElementById('previewLogo').src = LOGO_B64;

    window.exportPdf = function() {
        window.open('/api/export/pdf', '_blank');
    };

    window.printHtml = function() {
        window.open('/api/export/print', '_blank');
    };

    window.printBadges = function() {
        // Build a print-only page
        const badges = document.getElementById('badgesList').innerHTML;
        const printWin = window.open('', '_blank', 'width=900,height=700');
        printWin.document.write(`<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طباعة البطاقات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:white;padding:16px;}
.badges-list{display:flex;flex-wrap:wrap;gap:16px;justify-content:flex-start;}
.badge-item{position:relative;break-inside:avoid;}
.delete-badge{display:none;}
.badge{width:310px;height:450px;border-radius:14px;position:relative;overflow:hidden;
  box-shadow:0 0 0 4px #c8a96e,0 0 0 8px #556b2f;
  background-size:cover !important;background-position:center !important;}
.badge-bg-overlay{position:absolute;inset:0;background:rgba(15,25,8,0.5);z-index:1;display:none;}
.badge.has-bg-image .badge-bg-overlay{display:block;}
.badge-event{position:absolute;top:0;left:0;right:0;z-index:3;
  background:rgba(0,0,0,0.55);border-bottom:2px solid #c8a96e;
  color:#f5e6b0;font-family:'Tajawal',sans-serif;font-size:12.5px;font-weight:800;
  padding:9px 12px;text-align:center;line-height:1.5;}
.badge-content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:70px 16px 70px;}
.badge-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;
  border:3px solid #d4a84b;box-shadow:0 0 0 2px rgba(255,255,255,0.2),0 4px 12px rgba(0,0,0,0.5);margin-bottom:6px;}
.badge-photo{width:110px;height:110px;border-radius:50%;border:4px solid #d4a84b;
  box-shadow:0 0 0 3px rgba(255,255,255,0.15),0 6px 16px rgba(0,0,0,0.45);
  object-fit:cover;margin-bottom:10px;}
.badge-name{font-family:'Tajawal',sans-serif;font-size:18px;font-weight:900;
  color:#fff;text-shadow:1px 1px 8px rgba(0,0,0,0.8);text-align:center;}
.badge-mission-wrap{position:absolute;bottom:0;left:0;right:0;z-index:3;
  background:rgba(0,0,0,0.55);border-top:2px solid #c8a96e;padding:8px 12px;text-align:center;}
.badge-mission-label{font-family:'Tajawal',sans-serif;font-size:10px;color:#c8a96e;font-weight:700;}
.badge-mission-value{font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;
  color:#f5e6b0;text-shadow:1px 1px 4px rgba(0,0,0,0.7);}
@media print{
  body{padding:8px;}
  .badge-item{break-inside:avoid;}
}
</style>
</head>
<body>
<div class="badges-list">\${badges}</div>
<script>window.onload=function(){window.print();}<\/script>
</body></html>`);
        printWin.document.close();
    };
</script>
</body>
</html>
